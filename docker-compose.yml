services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: aranya-watch-postgres
    environment:
      POSTGRES_DB: aranya_watch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aranya_watch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aranya-watch-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/aranya_watch
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["sh", "./scripts/start_api.sh"]

volumes:
  postgres_data:
